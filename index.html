<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player</title>
    <style>
        body { 
            background: linear-gradient(135deg, #1a1a1a, #000); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
        }
        .container { 
            width: 95%; 
            max-width: 500px; 
            text-align: center; 
            padding-top: 20px; 
        }
        
        /* تصميم الفيديو */
        video { 
            width: 100%; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #333;
        }

        /* تصميم الأزرار */
        .btn { 
            display: block; 
            padding: 18px; 
            margin: 20px 0; 
            background: #e74c3c; 
            color: #fff; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 16px;
            transition: transform 0.2s, background 0.3s;
        }
        .btn:hover { background: #c0392b; transform: scale(1.02); }

        /* شريط التليجرام */
        .telegram-bar { 
            background: #0088cc; 
            padding: 15px; 
            margin-top: 10px; 
            display: block; 
            color: #fff; 
            text-decoration: none; 
            font-weight: bold;
            border-radius: 12px;
            transition: opacity 0.3s;
        }
        .telegram-bar:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="container">
        <!-- الفيديو -->
        <video controls autoplay playsinline>
            <source src="http://test-sportina.cfd:7777/max2-g/tracks-v1a1/mono.m3u8" type="application/x-mpegURL">
        </video>

        <!-- زر التطبيقات -->
        <a href="intent://live.http://test-sportina.cfd:7777/max2-g/tracks-v1a1/mono.m3u8" class="btn">
            📱 تطبيقات 404
        </a>
        
        <!-- رابط التليجرام -->
        <a href="https://t.me/c1_x2" target="_blank" class="telegram-bar">
            ✈️ اشترك في قناتنا في تليجرام
        </a>
    </div>

</body>
</html>
