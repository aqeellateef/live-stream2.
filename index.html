<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <title>تطبيقات 404 | البث الرياضي</title>
    <style>
        :root { --primary: #ffcc00; --bg: #0a0c10; }
        body { background: radial-gradient(circle at top right, #1a1f2e, #0a0c10); color: #fff; font-family: 'Tajawal', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

        .container { width: 100%; max-width: 550px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .brand { font-size: 26px; font-weight: 900; letter-spacing: -1px; }
        .status-pill { background: rgba(255, 51, 51, 0.1); border: 1px solid #ff3333; color: #ff3333; padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: bold; animation: blink 2s infinite; }
        
        .hero { text-align: center; margin-bottom: 20px; }
        .hero h1 { font-size: 28px; margin: 0; line-height: 1.2; }
        .hero p { color: #8892b0; font-size: 14px; margin-top: 8px; }

        .video-wrapper { position: relative; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid #232936; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; }
        
        .overlay-logo { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); }
        .sound-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--primary); color: #000; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: 900; font-size: 16px; transition: 0.3s; }
        
        .features { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .feat-item { background: #161b22; padding: 10px; border-radius: 12px; text-align: center; font-size: 11px; border: 1px solid #232936; }

        .tg-link { margin-top: 25px; width: 100%; background: linear-gradient(90deg, #0088cc, #0055ff); padding: 18px; border-radius: 16px; display: flex; justify-content: center; align-items: center; text-decoration: none; color: white; font-weight: 800; font-size: 18px; transition: 0.3s; gap: 10px; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <div class="brand">تطبيقات <span style="color:var(--primary)">404</span></div>

        <div class="video-wrapper">

</body>
</html>
